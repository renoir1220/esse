name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugins/esse
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/esse/package-lock.json
      - run: npm ci
      - run: npm run check
      - name: Verify tag and release metadata
        shell: pwsh
        run: npm run verify:release -- $env:GITHUB_REF_NAME

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-latest
          - target: macos-arm64
            runner: macos-15
          - target: macos-x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: plugins/esse
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/esse/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: npm ci
      - run: npm run build
      - run: node scripts/package-releases.mjs --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: esse-${{ matrix.target }}
          path: release/esse-${{ matrix.target }}-v*.zip
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/download-artifact@v8
        with:
          pattern: esse-*
          path: release
          merge-multiple: true
      - name: Create and verify release metadata
        shell: pwsh
        run: |
          node .\plugins\esse\scripts\create-release-metadata.mjs
          $metadata = Get-Content -Raw -Encoding UTF8 .\release\latest.json | ConvertFrom-Json
          if ($metadata.tag -ne $env:GITHUB_REF_NAME) { throw "latest.json tag does not match Git tag" }
          foreach ($prefix in @("windowsX64", "macosArm64", "macosX64")) {
            $asset = $metadata."${prefix}Asset"
            $expected = $metadata."${prefix}Sha256"
            $actual = (Get-FileHash -Algorithm SHA256 (Join-Path .\release $asset)).Hash.ToLowerInvariant()
            if ($actual -ne $expected) { throw "Checksum mismatch for $asset" }
          }
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = Get-ChildItem -LiteralPath .\release -File | Select-Object -ExpandProperty FullName
          $releaseNotes = Get-Content -Raw -Encoding UTF8 .\.github\release-notes-prefix.md
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --verify-tag --title "Esse $tag" --generate-notes --notes $releaseNotes
          }
