name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugins/esse
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/esse/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - run: npm run check
      - name: Verify tag and release metadata
        shell: pwsh
        run: npm run verify:release -- $env:GITHUB_REF_NAME
      - run: npm run package:releases
      - name: Verify packaged checksums
        shell: pwsh
        working-directory: .
        run: |
          $metadata = Get-Content -Raw -Encoding UTF8 .\release\latest.json | ConvertFrom-Json
          if ($metadata.tag -ne $env:GITHUB_REF_NAME) { throw "latest.json tag does not match Git tag" }
          foreach ($prefix in @("windowsX64", "macosArm64", "macosX64")) {
            $asset = $metadata."${prefix}Asset"
            $expected = $metadata."${prefix}Sha256"
            $actual = (Get-FileHash -Algorithm SHA256 (Join-Path .\release $asset)).Hash.ToLowerInvariant()
            if ($actual -ne $expected) { throw "Checksum mismatch for $asset" }
          }
      - name: Publish GitHub Release
        shell: pwsh
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath .\release -File | Select-Object -ExpandProperty FullName
          gh release create $env:GITHUB_REF_NAME @assets --verify-tag --title "Esse $env:GITHUB_REF_NAME" --generate-notes --notes "Unsigned Public Beta. Windows x64 and macOS arm64/x64 are supported. The installers verify SHA256 before changing the user-scoped local marketplace."
