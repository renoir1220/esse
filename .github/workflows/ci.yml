name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugins/esse
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/esse/package-lock.json
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: npm ci
      - run: npm run check
      - name: Record Windows cold/warm thumbnail benchmark
        run: npm run benchmark:thumbnails
      - run: node scripts/package-releases.mjs --target windows-x64
      - name: Run Windows installation user-path E2E
        run: npm run e2e:windows
      - name: Parse Windows installer
        shell: pwsh
        working-directory: .
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw -Encoding UTF8 .\install.ps1))
      - name: Parse macOS installer
        shell: bash
        working-directory: .
        run: bash -n ./install.sh

  macos-package-safety:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
          - target: macos-x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: plugins/esse
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/esse/package-lock.json
      - run: npm ci
      - run: npm run check
      - name: Record macOS cold/warm thumbnail benchmark
        run: npm run benchmark:thumbnails
      - run: node scripts/package-releases.mjs --target ${{ matrix.target }}
      - name: Verify macOS archive contains only the safe launcher
        shell: bash
        working-directory: .
        run: |
          archive=(release/esse-${{ matrix.target }}-v*.zip)
          test "${#archive[@]}" -eq 1
          extracted="$(mktemp -d)"
          /usr/bin/ditto -x -k "${archive[0]}" "$extracted"
          launcher="$extracted/plugins/esse/bin/esse"
          test -f "$extracted/plugins/esse/mcp/server.cjs"
          /bin/bash -n "$launcher"
          if /usr/bin/file "$launcher" | grep -q 'Mach-O'; then
            echo "macOS package must not contain an Esse-built Mach-O launcher" >&2
            exit 1
          fi
          grep -q '"command": "/bin/bash"' "$extracted/plugins/esse/.mcp.json"
          ESSE_NODE_BIN="$(command -v node)" /bin/bash "$launcher" --self-test
          install_root="$(mktemp -d)/plugin"
          version="$(node -p "require('./plugins/esse/package.json').version")"
          ESSE_INSTALL_ROOT="$install_root" \
            ESSE_CODEX_BIN="$PWD/plugins/esse/test/fixtures/fake-codex.sh" \
            ESSE_NODE_BIN="$(command -v node)" \
            ESSE_FAKE_PLUGIN_VERSION="$version" \
            /bin/bash "$extracted/install.sh"
          grep -q "\"version\": \"$version\"" "$install_root/install-receipt.json"
          installed_widget="$install_root/versions/$version/plugins/esse/mcp/widget.html"
          printf 'corrupt same-version widget' > "$installed_widget"
          mkdir -p "$install_root/versions/0.0.1" "$install_root/versions/0.0.2"
          ESSE_INSTALL_ROOT="$install_root" \
            ESSE_CODEX_BIN="$PWD/plugins/esse/test/fixtures/fake-codex.sh" \
            ESSE_NODE_BIN="$(command -v node)" \
            ESSE_FAKE_PLUGIN_VERSION="$version" \
            /bin/bash "$extracted/install.sh"
          cmp "$installed_widget" "$extracted/plugins/esse/mcp/widget.html"
          test "$(find "$install_root/versions" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')" -eq 1
